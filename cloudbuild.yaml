steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/shl-recommender:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/shl-recommender:latest'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/shl-recommender:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/shl-recommender:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shl-recommender'
      - '--image=gcr.io/$PROJECT_ID/shl-recommender:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--port=8080'
      - '--set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest'

# Store the built image in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/shl-recommender:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/shl-recommender:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # Faster build (faiss-cpu compiles slowly)
